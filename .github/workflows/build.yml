name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-build:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build release binary
        run: swift build -c release

      - name: Run search engine self-test
        run: swiftc Sources/MacEverything/SearchTypes.swift Tests/SearchEngineSelfTest.swift -o /tmp/MacEverythingSearchSelfTest && /tmp/MacEverythingSearchSelfTest
